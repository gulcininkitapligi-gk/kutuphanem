<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gülçin'in Kitaplığı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .hidden-admin { display: none !important; }
        .bg-custom { background-image: url('https://i.ibb.co/gMCSz2PZ/4a30568e-4bd1-4300-9c6c-0a4aa5445a9f.jpg'); background-size: cover; background-position: center; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <div class="fixed inset-0 -z-10 bg-custom brightness-50"></div>

    <div class="flex h-screen">
        <div class="w-72 bg-zinc-900/90 border-r border-zinc-800 p-8 flex flex-col items-center text-center">
            <img src="https://i.ibb.co/Qvt55t6p/image-6.jpg" class="w-32 h-32 rounded-full border-4 border-amber-600 shadow-xl mb-4 object-cover">
            <h1 class="text-2xl font-bold text-white mb-1">Gülçin Beyan</h1>
            <p class="text-zinc-400 text-sm mb-8">İnsan salyangoz gibi kitaplığını sonsuza kadar sırtında taşıyamaz. Kişisel sayılabilecek tek kitaplık akılda kalandır.</p>
            <nav class="space-y-4 w-full">
                <a onclick="showSection('library')" class="cursor-pointer hover:text-amber-500 block"><i class="fa-solid fa-book"></i> Kütüphanem</a>
                <a id="add-menu-item" onclick="showSection('add')" class="hidden-admin cursor-pointer hover:text-green-500 block text-green-400"><i class="fa-solid fa-plus"></i> Yeni Kitap Ekle</a>
            </nav>
        </div>

        <div class="flex-1 p-10 overflow-auto">
            <div id="library-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            
            <div id="add-section" class="hidden max-w-lg bg-zinc-900/95 p-8 rounded-2xl border border-zinc-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4">Yeni Kitap Ekle</h2>
                <form id="book-form" onsubmit="addBook(event)" class="space-y-3">
                    <input id="title" placeholder="Kitap İsmi" required class="w-full bg-zinc-800 p-2 rounded border border-zinc-700">
                    <input id="author" placeholder="Yazar İsmi" required class="w-full bg-zinc-800 p-2 rounded border border-zinc-700">
                    <input id="coverUrl" placeholder="Kitap Kapağı Görsel Linki" class="w-full bg-zinc-800 p-2 rounded border border-zinc-700">
                    <textarea id="thoughts" placeholder="Kitap hakkında düşüncelerin..." class="w-full bg-zinc-800 p-2 rounded border border-zinc-700 h-24"></textarea>
                    <select id="rating" class="w-full bg-zinc-800 p-2 rounded border border-zinc-700">
                        <option value="5">⭐⭐⭐⭐⭐ (5/5)</option><option value="4">⭐⭐⭐⭐ (4/5)</option>
                        <option value="3">⭐⭐⭐ (3/5)</option><option value="2">⭐⭐ (2/5)</option><option value="1">⭐ (1/5)</option>
                    </select>
                    <div class="flex gap-2 pt-4">
                        <button type="submit" class="bg-green-700 flex-1 py-2 rounded font-bold">Kaydet</button>
                        <button type="button" onclick="showSection('library')" class="bg-zinc-700 flex-1 py-2 rounded">Kapat</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const db = getFirestore(initializeApp({
            apiKey: 'AIzaSyAMcnq-dUBN3ZXn0vc7euRuCn8BbSdLEJM',
            projectId: 'gulcin-11b09',
            authDomain: 'gulcin-11b09.firebaseapp.com',
            storageBucket: 'gulcin-11b09.firebasestorage.app',
            messagingSenderId: '586276873220',
            appId: '1:586276873220:web:bc134a551a9ce8e356c151'
        }));

        window.showSection = (s) => {
            document.getElementById('library-section').classList.toggle('hidden', s !== 'library');
            document.getElementById('add-section').classList.toggle('hidden', s !== 'add');
        };

        window.activateAdmin = () => {
            if (prompt("Şifre:") === "1234") {
                document.querySelectorAll('.hidden-admin').forEach(el => el.classList.remove('hidden-admin'));
            }
        };

        document.addEventListener('keydown', (e) => { if(e.shiftKey && e.key === 'E') activateAdmin(); });

        window.addBook = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'books'), {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                cover: document.getElementById('coverUrl').value,
                thoughts: document.getElementById('thoughts').value,
                rating: document.getElementById('rating').value
            });
            location.reload();
        };

        window.deleteBook = async (id) => { if(confirm("Silinsin mi?")) { await deleteDoc(doc(db, 'books', id)); location.reload(); } };

        window.onload = async () => {
            const snapshot = await getDocs(collection(db, 'books'));
            const grid = document.getElementById('library-section');
            snapshot.docs.forEach(doc => {
                const d = doc.data();
                grid.innerHTML += `
                <div class='bg-zinc-900/80 p-4 rounded-xl border border-zinc-700 backdrop-blur-sm'>
                    <img src="${d.cover || 'https://via.placeholder.com/150'}" class="w-full h-48 object-cover mb-3 rounded">
                    <h3 class='font-bold text-lg'>${d.title}</h3>
                    <p class='text-zinc-400 text-sm mb-2'>${d.author}</p>
                    <p class='text-xs italic text-zinc-300 mb-2'>"${d.thoughts}"</p>
                    <p class='text-amber-500 mb-3'>${'⭐'.repeat(d.rating)}</p>
                    <div class='flex gap-2 hidden-admin'>
                        <button onclick="deleteBook('${doc.id}')" class='bg-red-900/50 flex-1 py-1 rounded text-xs'>Sil</button>
                        <button class='bg-blue-900/50 flex-1 py-1 rounded text-xs'>Düzelt</button>
                    </div>
                </div>`;
            });
        };
    </script>
</body>
</html>
